name: Build Server Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up before build
        run: |
          docker image prune -f
          docker volume prune -f

      - name: Set tags
        id: vars
        run: |
          COMMIT_HASH=$(git rev-parse --short=8 HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          # timestamp+commit
          echo "LATEST_TAG=${TIMESTAMP}-latest-${COMMIT_HASH}" >> $GITHUB_ENV
          echo "SHORT_TAG=${TIMESTAMP}-short-${COMMIT_HASH}" >> $GITHUB_ENV
          echo "TIME_TAG=${TIMESTAMP}-${COMMIT_HASH}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -f Dockerfile.server \
            -t ghcr.io/${{ github.repository_owner }}/happy-server:latest \
            -t ghcr.io/${{ github.repository_owner }}/happy-server:${LATEST_TAG} \
            -t ghcr.io/${{ github.repository_owner }}/happy-server:${SHORT_TAG} \
            -t ghcr.io/${{ github.repository_owner }}/happy-server:${TIME_TAG} .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/happy-server:latest
          docker push ghcr.io/${{ github.repository_owner }}/happy-server:${LATEST_TAG}
          docker push ghcr.io/${{ github.repository_owner }}/happy-server:${SHORT_TAG}
          docker push ghcr.io/${{ github.repository_owner }}/happy-server:${TIME_TAG}